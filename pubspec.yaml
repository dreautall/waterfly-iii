name: waterflyiii
description: Waterfly III, a mobile client for Firefly III
publish_to: 'none'

version: 1.2.0-beta.4

environment:
  sdk: '>=3.10.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  # dart.dev
  async: ^2.13.1
  intl: 0.20.2
  collection: ^1.19.0
  logging: ^1.3.0
  timezone: ^0.11.0
  http: ^1.6.0
  cronet_http: ^1.8.0
  cupertino_http: ^2.3.0
  # flutter.dev
  path_provider: ^2.1.4
  shared_preferences: ^2.3.4
  flutter_svg: ^2.2.4
  url_launcher: ^6.3.2
  animations: ^2.1.2
  local_auth: ^3.0.0
  quick_actions: ^1.0.7
  image_picker: ^1.0.7
  # material.io
  dynamic_color: ^1.7.0
  material_color_utilities: ^0.13.0
  # other
  flutter_secure_storage: ^10.0.0
  provider: ^6.1.2
  chopper: ^8.4.0
  infinite_scroll_pagination: ^5.1.1
  badges: ^3.1.2
  filesize: ^2.0.1
  community_charts_flutter: ^1.0.2
  file_picker: ^11.0.2
  flutter_local_notifications: ^21.0.0
  notifications_listener_service:
    git:
      url: https://github.com/dreautall/notification_listener_service.git
      ref: main
  appcheck: ^1.7.0
  package_info_plus: ^9.0.1
  flutter_email_sender: ^8.0.0
  version: ^3.0.2
  stock: ^1.1.0
  syncfusion_flutter_charts: ^33.1.46
  flutter_timezone: ^5.0.0
  flutter_sharing_intent: ^2.0.3
  open_file_plus:
    git:
      url: https://github.com/postflow/open_file_plus.git
      ref: main
  expressions: ^0.2.5+3

dev_dependencies:
  flutter_lints: ^6.0.0
  # needed for swagger_dart_code_generator
  build_runner: ^2.12.2
  chopper_generator: ^8.2.0
  json_serializable: ^6.13.0
  swagger_dart_code_generator: ^4.1.0
  flutter_native_splash: ^2.4.6
  flutter_test:
    sdk: flutter
  test: ^1.16.0

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/logo.svg

flutter_native_splash:
  android: true
  ios: true
  web: false
  color: "#fdfcfe"
  color_dark: "#1a1c1e"